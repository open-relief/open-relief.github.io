<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Simple Demo</title>
<style>
body{font-family:sans-serif;padding:20px;}
label,button{display:block;margin:8px 0;}
input{padding:4px;width:200px;}
.status{margin-top:10px;transition:transform 0.3s;}
.status.success{color:green;animation:pop 0.1s ease-out;}
@keyframes pop{0%{transform:scale(500);}50%{transform:scale(1.2);}100%{transform:scale(1);}}
#banner{position:fixed;top:0;left:0;width:100%;background:rgb(255, 255, 255);color:#000;text-align:center;font-weight:bold;padding:4px;animation:slide 5s linear infinite;}
@keyframes slide{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
</style>
</head>
<body>
<div id="banner">IN DEVELOPMENT  IN DEVELOPMENT  IN DEVELOPMENT  IN DEVELOPMENT  IN DEVELOPMENT </div>
<h1>Interledger Payment Demo</h1>
<label>Self ILP Address <input id="self" type="text" value="$alice.example.com"></label>
<label>Target ILP Address <input id="target" type="text" value="$bob.example.com"></label>
<label>Amount <input id="amount" type="number" min="1" value="100"></label>
<button id="send">Send Payment</button>
<div id="status" class="status"></div>
<script>
function createSampleInterledgerClient(){
 let selfAccount='', targetAccount='';
 return {
  setSelfAccount(v){selfAccount=v;},
  setTargetAccount(v){targetAccount=v;},
  sendPayment(amount){return new Promise(r=>setTimeout(()=>r({ok:true,selfAccount,targetAccount,amount,transactionId:crypto.randomUUID()}),700));}
 };
}
const client=createSampleInterledgerClient();
document.getElementById('send').addEventListener('click',async()=>{
 const self=document.getElementById('self').value.trim();
 const target=document.getElementById('target').value.trim();
 const amt=Number(document.getElementById('amount').value);
 const statusEl=document.getElementById('status');
 if(!Number.isFinite(amt)||amt<=0){statusEl.textContent='Amount must be positive';return;}
 statusEl.textContent='Sending...';
 try{
  client.setSelfAccount(self);
  client.setTargetAccount(target);
  await client.sendPayment(amt);
  statusEl.textContent='Payment sent successfully!';
  statusEl.classList.add('success');
  setTimeout(()=>statusEl.classList.remove('success'),3000);
 }catch(e){statusEl.textContent='Error: '+e;}
});
</script>
</body>
</html>
